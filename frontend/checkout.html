<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Car Wash</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://js.stripe.com/v3/"></script>
    <script>(function(){if(localStorage.getItem('sidebarCollapsed')==='1')document.documentElement.classList.add('sidebar-pre-collapsed');})()</script>
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-header">
            <button onclick="window.location.href='/cart.html'" class="back-btn">← Back to Cart</button>
            <h1>💳 Secure Checkout</h1>
        </div>

        <div id="init-error" style="display:none; background:#f8d7da; color:#721c24; padding:15px; border-radius:10px; margin-bottom:20px; font-weight:600;"></div>

        <div class="checkout-grid">
            <!-- Order Summary + Test Data -->
            <div class="order-summary-card">
                <h2>Order Summary</h2>
                <div id="summary-items"><p style="color:#999;">Loading...</p></div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="summary-total">$0.00</span>
                </div>

                <!-- Test Card Panel — always visible -->
                <div style="margin-top:15px; padding:14px; background:#fff3cd; border-radius:10px; border-left:4px solid #ffc107;">
                    <p style="margin:0 0 10px 0; font-size:13px; color:#856404; font-weight:700;">🧪 Test Mode — Card Details</p>
                    <div style="display:grid; gap:6px; margin-bottom:12px;">
                        <div class="test-row">
                            <span>Card Number</span>
                            <div>
                                <code>4242 4242 4242 4242</code>
                                <button class="copy-btn" onclick="copyText('4242424242424242', this)">📋 Copy</button>
                            </div>
                        </div>
                        <div class="test-row">
                            <span>Expiry</span>
                            <div>
                                <code>12/29</code>
                                <button class="copy-btn" onclick="copyText('1229', this)">📋 Copy</button>
                            </div>
                        </div>
                        <div class="test-row">
                            <span>CVC</span>
                            <div>
                                <code>123</code>
                                <button class="copy-btn" onclick="copyText('123', this)">📋 Copy</button>
                            </div>
                        </div>
                        <div class="test-row">
                            <span>ZIP</span>
                            <div>
                                <code>12345</code>
                                <button class="copy-btn" onclick="copyText('12345', this)">📋 Copy</button>
                            </div>
                        </div>
                    </div>
                    <button type="button" onclick="fillTestFields()" style="width:100%; background:#ffc107; border:none; padding:9px; border-radius:6px; font-weight:700; font-size:13px; cursor:pointer; color:#333;">⚡ Fill Name & ZIP</button>
                </div>
            </div>

            <!-- Payment Form -->
            <div class="payment-card">
                <h2>Payment Details</h2>
                <div id="stripe-loading" style="text-align:center; padding:20px; color:#667eea; font-weight:600;">⏳ Loading payment form...</div>
                <form id="payment-form" style="display:none;">
                    <div class="form-group">
                        <label>Card Number</label>
                        <div id="card-number-element" class="stripe-input"></div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <div id="card-expiry-element" class="stripe-input"></div>
                        </div>
                        <div class="form-group">
                            <label>CVC</label>
                            <div id="card-cvc-element" class="stripe-input"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Name on Card</label>
                        <input type="text" id="card-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>ZIP / Postal Code</label>
                        <input type="text" id="card-zip" placeholder="12345" maxlength="10">
                    </div>
                    <div id="card-errors" style="color:#dc3545; font-size:13px; margin-bottom:10px; min-height:20px;"></div>
                    <button type="submit" id="pay-btn" class="pay-btn">
                        <span id="pay-btn-text">Pay Now</span>
                        <span id="pay-spinner" style="display:none;">⏳ Processing...</span>
                    </button>
                </form>
                <div class="secure-badge">🔒 Payments secured by <strong>Stripe</strong></div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/router.js"></script>
    <script>
        let stripe, cardNumberElement, cardExpiryElement, cardCvcElement, clientSecret;

        const stripeStyle = {
            base: { fontSize: '16px', color: '#2c3e50', fontFamily: "'Segoe UI', sans-serif", '::placeholder': { color: '#aab7c4' } },
            invalid: { color: '#dc3545' }
        };

        function showInitError(msg) {
            const el = document.getElementById('init-error');
            el.textContent = '❌ ' + msg;
            el.style.display = 'block';
            document.getElementById('stripe-loading').style.display = 'none';
        }

        async function init() {
            const token = getToken();
            if (!token) { window.location.href = '/login.html'; return; }

            try {
                // Load cart
                const cartRes = await fetch(`${API_BASE}/cart`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!cartRes.ok) throw new Error('Failed to load cart');
                const cart = await cartRes.json();
                if (!cart.length) { window.location.href = '/cart.html'; return; }

                const total = cart.reduce((s, i) => s + i.quantity * i.price_at_add, 0);
                document.getElementById('summary-total').textContent = `$${total.toFixed(2)}`;
                document.getElementById('summary-items').innerHTML = cart.map(i => `
                    <div class="summary-item">
                        <span>${i.product_service.name} ×${i.quantity}</span>
                        <span>$${(i.quantity * i.price_at_add).toFixed(2)}</span>
                    </div>
                `).join('');

                // Get Stripe publishable key
                const configRes = await fetch(`${API_BASE}/payments/config`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!configRes.ok) throw new Error('Stripe is not configured. Add STRIPE_PUBLISHABLE_KEY to your environment.');
                const config = await configRes.json();
                if (!config.publishable_key) throw new Error('Stripe publishable key missing.');

                stripe = Stripe(config.publishable_key);

                // Create PaymentIntent
                const intentRes = await fetch(`${API_BASE}/payments/create-payment-intent`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ payment_method: 'card' })
                });
                if (!intentRes.ok) throw new Error('Failed to create payment intent. Check Stripe secret key.');
                const intent = await intentRes.json();
                if (!intent.client_secret) throw new Error('No client secret returned from Stripe.');

                clientSecret = intent.client_secret;
                document.getElementById('pay-btn-text').textContent = `Pay $${intent.amount.toFixed(2)}`;

                // Mount Stripe Elements
                const elements = stripe.elements();
                cardNumberElement = elements.create('cardNumber', { style: stripeStyle, showIcon: true });
                cardExpiryElement = elements.create('cardExpiry', { style: stripeStyle });
                cardCvcElement    = elements.create('cardCvc',    { style: stripeStyle });

                cardNumberElement.mount('#card-number-element');
                cardExpiryElement.mount('#card-expiry-element');
                cardCvcElement.mount('#card-cvc-element');

                [cardNumberElement, cardExpiryElement, cardCvcElement].forEach(el => {
                    el.on('change', e => {
                        document.getElementById('card-errors').textContent = e.error ? e.error.message : '';
                    });
                });

                document.getElementById('stripe-loading').style.display = 'none';
                document.getElementById('payment-form').style.display = 'block';

            } catch (err) {
                showInitError(err.message);
            }
        }

        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!stripe || !clientSecret || !cardNumberElement) {
                document.getElementById('card-errors').textContent = 'Payment form not ready. Please refresh.';
                return;
            }

            const btn = document.getElementById('pay-btn');
            btn.disabled = true;
            document.getElementById('pay-btn-text').style.display = 'none';
            document.getElementById('pay-spinner').style.display = 'inline';
            document.getElementById('card-errors').textContent = '';

            try {
                const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
                    payment_method: {
                        card: cardNumberElement,
                        billing_details: {
                            name: document.getElementById('card-name').value || 'Customer',
                            address: { postal_code: document.getElementById('card-zip').value || '12345' }
                        }
                    }
                });

                if (error) {
                    document.getElementById('card-errors').textContent = error.message;
                    btn.disabled = false;
                    document.getElementById('pay-btn-text').style.display = 'inline';
                    document.getElementById('pay-spinner').style.display = 'none';
                    return;
                }

                if (paymentIntent.status === 'succeeded') {
                    const token = getToken();
                    await fetch(`${API_BASE}/orders/`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ payment_method: 'stripe' })
                    });
                    showToast('Payment successful! Order placed. 🎉', 'success');
                    setTimeout(() => window.location.href = '/client-dashboard.html?payment=success', 2000);
                }
            } catch (err) {
                document.getElementById('card-errors').textContent = 'Payment failed: ' + err.message;
                btn.disabled = false;
                document.getElementById('pay-btn-text').style.display = 'inline';
                document.getElementById('pay-spinner').style.display = 'none';
            }
        });

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.innerHTML;
                btn.innerHTML = '✅ Copied';
                btn.style.background = '#28a745';
                setTimeout(() => { btn.innerHTML = orig; btn.style.background = '#667eea'; }, 1500);
            }).catch(() => {
                // Fallback for browsers that block clipboard
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.innerHTML = '✅ Copied';
                btn.style.background = '#28a745';
                setTimeout(() => { btn.innerHTML = '📋 Copy'; btn.style.background = '#667eea'; }, 1500);
            });
        }

        function fillTestFields() {
            document.getElementById('card-name').value = 'Test User';
            document.getElementById('card-zip').value = '12345';
            showToast('Name & ZIP filled! Now copy and paste Card Number, Expiry, and CVC into the fields.', 'success');
        }

        init();
    </script>

    <style>
        * { box-sizing: border-box; }
        body { margin:0; padding:0; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; }
        .checkout-container { max-width:1000px; margin:0 auto; padding:30px 20px; }
        .checkout-header { display:flex; align-items:center; gap:20px; margin-bottom:20px; flex-wrap:wrap; }
        .checkout-header h1 { color:white; margin:0; font-size:2rem; text-shadow:2px 2px 4px rgba(0,0,0,0.2); }
        .back-btn { background:white; border:none; padding:10px 20px; border-radius:50px; cursor:pointer; font-size:15px; font-weight:600; box-shadow:0 4px 15px rgba(0,0,0,0.2); transition:all 0.3s; }
        .back-btn:hover { transform:translateY(-2px); }
        .checkout-grid { display:grid; grid-template-columns:1fr 1.4fr; gap:25px; }
        .order-summary-card, .payment-card { background:white; border-radius:20px; padding:30px; box-shadow:0 8px 30px rgba(0,0,0,0.15); }
        h2 { margin:0 0 20px 0; color:#2c3e50; font-size:1.3rem; }
        .summary-item { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f0f0f0; font-size:15px; color:#555; }
        .summary-total { display:flex; justify-content:space-between; padding:15px 0 0 0; font-size:1.2rem; font-weight:700; color:#2c3e50; }
        .test-row { display:flex; justify-content:space-between; align-items:center; background:white; padding:6px 10px; border-radius:6px; }
        .test-row span { font-size:13px; color:#333; }
        .test-row div { display:flex; align-items:center; gap:8px; }
        .test-row code { font-size:13px; color:#667eea; font-weight:700; }
        .copy-btn { background:#667eea; color:white; border:none; padding:3px 8px; border-radius:4px; font-size:11px; cursor:pointer; }
        .form-group { margin-bottom:20px; }
        .form-group label { display:block; margin-bottom:8px; font-weight:600; color:#2c3e50; font-size:14px; }
        .form-group input { width:100%; padding:12px 15px; border:2px solid #e0e0e0; border-radius:8px; font-size:15px; transition:border-color 0.3s; }
        .form-group input:focus { outline:none; border-color:#667eea; }
        .stripe-input { padding:12px 15px; border:2px solid #e0e0e0; border-radius:8px; background:white; transition:border-color 0.3s; }
        .pay-btn { width:100%; padding:16px; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; border:none; border-radius:12px; font-size:1.1rem; font-weight:700; cursor:pointer; transition:all 0.3s; margin-top:5px; }
        .pay-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 25px rgba(102,126,234,0.4); }
        .pay-btn:disabled { opacity:0.7; cursor:not-allowed; }
        .secure-badge { text-align:center; margin-top:15px; font-size:13px; color:#888; }
        @media (max-width:768px) { .checkout-grid { grid-template-columns:1fr; } .checkout-header h1 { font-size:1.5rem; } }
    </style>
</body>
</html>
