<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop – Car Wash Store</title>
    <meta name="description" content="Browse premium car wash products and services. Add to cart and checkout instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── GLOBAL OVERFLOW LOCK — prevents ANY element from causing horizontal scroll ── */
        html {
            overflow-x: hidden;
            max-width: 100vw;
        }

        :root {
            --brand: var(--primary-color, #667eea);
            --brand-dark: var(--sidebar-color, #2c3e50);
            --brand-light: rgba(102,126,234,.08);
            --yellow: #fbbf24;
            --text-primary: #111;
            --text-secondary: #555;
            --text-muted: #999;
            --bg: #f5f5f5;
            --white: #fff;
            --border: #e8e8e8;
            --card-radius: 10px;
            --shadow: 0 2px 8px rgba(0,0,0,.08);
            --shadow-md: 0 4px 20px rgba(0,0,0,.12);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            max-width: 100vw;
            width: 100%;
        }

        /* ─── TOP HEADER ─────────────────────────────────── */
        .top-bar {
            background: var(--brand);
            color: white;
            font-size: 12px;
            text-align: center;
            padding: 6px 16px;
            letter-spacing: .3px;
        }
        .top-bar a { color: white; text-decoration: none; font-weight: 600; }

        /* ── TWO-ROW HEADER ── */
        .shop-header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        /* Row 1: Home | Store Name (center) | Vouchers */
        .header-row1 {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 16px 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .back-link {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            flex-shrink: 0;
            padding: 4px 8px;
            border-radius: 6px;
            transition: color .2s;
        }
        .back-link:hover { color: var(--brand); }
        .store-name-center {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 800;
            color: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .header-icon-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 10px;
            font-family: inherit;
            padding: 4px 8px;
            border-radius: 6px;
            transition: color .2s;
            position: relative;
            flex-shrink: 0;
        }
        .header-icon-btn:hover { color: var(--brand); }
        .header-icon-btn .ci { font-size: 20px; }
        .header-cart-badge {
            position: absolute;
            top: 0;
            right: 4px;
            background: var(--brand);
            color: white;
            border-radius: 50%;
            min-width: 17px;
            height: 17px;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 3px;
        }
        .header-cart-badge.hide { display: none; }

        /* Row 2: Search bar */
        .header-row2 {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px 10px;
        }
        .search-bar {
            display: flex;
            border: 2px solid var(--brand);
            border-radius: 6px;
            overflow: hidden;
            width: 100%;
        }
        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            padding: 9px 14px;
            font-size: 14px;
            font-family: inherit;
            background: white;
            min-width: 0;
        }
        .search-bar button {
            background: var(--brand);
            color: white;
            border: none;
            padding: 0 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s;
            font-family: inherit;
            white-space: nowrap;
        }
        .search-bar button:hover { background: var(--brand-dark); }

        /* ─── BANNER / FLASH SALE ────────────────────────── */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            width: 100%;
            overflow-x: hidden;   /* prevent any child from causing side-scroll */
            box-sizing: border-box;
        }

        .flash-banner {
            background: linear-gradient(120deg, #0f0f0f 0%, #2d0014 50%, #1a0006 100%);
            border-radius: var(--card-radius);
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 14px;
            overflow: hidden;
            position: relative;
        }
        .flash-banner::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(240,45,85,.35), transparent 70%);
            pointer-events: none;
        }
        .flash-label {
            background: var(--brand);
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: .5px;
            white-space: nowrap;
        }
        .flash-countdown {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .count-seg {
            background: white;
            color: var(--brand);
            font-weight: 800;
            font-size: 18px;
            min-width: 34px;
            text-align: center;
            border-radius: 5px;
            padding: 2px 6px;
        }
        .count-colon { color: var(--yellow); font-weight: 800; font-size: 18px; }
        .flash-text { color: white; font-size: 13px; opacity: .85; flex: 1; }
        .flash-cta { color: var(--yellow); font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; }

        /* ─── VOUCHER STRIP (horizontal scroll) ─────── */
        .voucher-section {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .voucher-scroll {
            display: flex;
            gap: 10px;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .voucher-scroll::-webkit-scrollbar { display: none; }
        .voucher-card {
            flex-shrink: 0;
            min-width: 200px;
            background: white;
            border: 1.5px dashed var(--brand);
            border-radius: var(--card-radius);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: box-shadow .2s, transform .2s;
        }
        .voucher-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
        .vc-off { font-size: 18px; font-weight: 800; color: var(--brand); white-space: nowrap; }
        .vc-label { font-size: 11px; color: var(--text-secondary); min-width: 0; }
        .vc-label strong { display: block; font-size: 12px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .vc-btn {
            margin-left: auto;
            background: var(--brand);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .more-vouchers-btn {
            flex-shrink: 0;
            padding: 10px 14px;
            background: white;
            border: 1.5px solid var(--border);
            border-radius: var(--card-radius);
            color: var(--brand);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            transition: background .2s, border-color .2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .more-vouchers-btn:hover { background: var(--brand-light); border-color: var(--brand); }
        .voucher-skeleton {
            flex-shrink: 0;
            min-width: 200px;
            height: 56px;
            border-radius: var(--card-radius);
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        /* ─── CATEGORY FILTER BAR ────────────────────────── */
        .category-bar {
            background: white;
            border-radius: var(--card-radius);
            padding: 0 6px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            display: flex;
            overflow-x: auto;
            gap: 0;
            scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-btn {
            flex-shrink: 0;
            padding: 14px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 3px solid transparent;
            transition: all .2s;
            white-space: nowrap;
            font-family: inherit;
        }
        .cat-btn:hover { color: var(--brand); }
        .cat-btn.active {
            color: var(--brand);
            border-bottom-color: var(--brand);
            font-weight: 700;
        }

        /* ─── SORT & RESULT BAR ──────────────────────────── */
        .sort-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .sort-label { font-size: 13px; color: var(--text-muted); }
        .sort-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-secondary);
            transition: all .2s;
        }
        .sort-btn:hover, .sort-btn.active {
            border-color: var(--brand);
            color: var(--brand);
            font-weight: 600;
        }
        .result-count { font-size: 13px; color: var(--text-muted); margin-left: auto; }

        /* ─── PRODUCT GRID ───────────────────────────────── */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 100%;
            overflow: hidden;   /* belt-and-suspenders: clip any leak */
        }
        @media (min-width: 600px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 900px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1100px) { .product-grid { grid-template-columns: repeat(5, 1fr); } }

        .product-card {
            background: var(--white);
            border-radius: var(--card-radius);
            overflow: hidden;          /* clips any internal overflow */
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: box-shadow .25s, transform .25s;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;              /* ← THE KEY FIX: grid children must have this
                                          or they can grow past their 1fr column */
            width: 100%;               /* never exceed allocated column width */
        }
        .product-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .product-img-wrap {
            aspect-ratio: 1;
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .product-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-emoji-placeholder {
            font-size: 52px;
            user-select: none;
        }

        .product-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--brand);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
        }
        .product-badge.service { background: #7c3aed; }

        .card-body {
            padding: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 0;    /* prevent text from blowing past card */
            overflow: hidden;
        }
        .card-name {
            font-size: 12px;
            color: var(--text-primary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;   /* long words wrap instead of overflow */
        }
        .card-price-row { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
        .card-price {
            font-size: 15px;
            font-weight: 800;
            color: var(--brand);
            white-space: nowrap;
        }
        .card-desc {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 1;    /* 1 line on mobile to save space */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-add-btn {
            margin-top: auto;
            width: 100%;
            padding: 8px 4px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;           /* smaller on mobile */
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: background .2s, transform .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-add-btn:hover { background: var(--brand-dark); transform: scale(1.02); }
        .card-add-btn.service-btn { background: #7c3aed; }
        .card-add-btn.service-btn:hover { background: #6d28d9; }

        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--card-radius);
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton-card { height: 260px; }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .es-icon { font-size: 64px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }
        .empty-state a {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 24px;
            background: var(--brand);
            color: white;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        /* ─── FLOATING CART BUTTON ───────────────────────── */
        .floating-cart {
            position: fixed;
            bottom: 24px;
            right: 20px;
            background: var(--brand);
            color: white;
            border: none;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            box-shadow: 0 6px 24px rgba(240,45,85,.45);
            cursor: pointer;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .2s, box-shadow .2s;
            z-index: 200;
        }
        .floating-cart:hover { transform: scale(1.1); box-shadow: 0 8px 30px rgba(240,45,85,.55); }
        .floating-cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: white;
            color: var(--brand);
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            font-size: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--brand);
            padding: 0 3px;
        }
        .floating-cart-badge.hide { display: none; }

        /* Toast notif for add to cart */
        .cart-nudge {
            position: fixed;
            top: 70px;
            right: 16px;
            background: #111;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            z-index: 300;
            transform: translateY(-20px);
            opacity: 0;
            transition: all .3s;
            pointer-events: none;
        }
        .cart-nudge.show { transform: translateY(0); opacity: 1; }

        /* Mobile nav bottom — locked to viewport, never scrolls with page */
        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            /* Use 0 + width 100vw so it's tied to viewport, not document width */
            left: 0;
            width: 100vw;
            background: white;
            border-top: 1px solid var(--border);
            z-index: 9999;
            padding: 6px 0 env(safe-area-inset-bottom, 10px);
            box-shadow: 0 -2px 12px rgba(0,0,0,.08);
            overflow: hidden;
        }
        .mobile-bottom-nav .nav-items {
            display: flex;
            justify-content: space-around;
            width: 100%;
            overflow: hidden;
        }
        .mobile-bottom-nav .nav-item {
            flex: 1;                  /* equal width, fills 100% together */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            font-size: 10px;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: none;
            padding: 6px 4px;
            min-width: 0;             /* prevents flex children from overflowing */
            overflow: hidden;
        }
        .mobile-bottom-nav .nav-item.active { color: var(--brand); }
        .mobile-bottom-nav .nav-item .ni {
            font-size: 20px;
            position: relative;
            line-height: 1;
        }
        .mobile-bottom-nav .nav-item .ni .nb {
            position: absolute;
            top: -4px;
            right: -8px;
            background: var(--brand);
            color: white;
            border-radius: 50%;
            min-width: 16px;
            height: 16px;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 680px) {
            .mobile-bottom-nav { display: block; }
            .floating-cart { bottom: 80px; right: 14px; width: 48px; height: 48px; font-size: 20px; }
            .flash-banner { padding: 12px 14px; gap: 10px; }
            .flash-text { display: none; }
            .voucher-row { gap: 8px; }
            .top-bar { display: none; }
            body { padding-bottom: 68px; }

            /* Sort bar: scrollable horizontally on mobile, no wrapping */
            .sort-bar {
                overflow-x: auto;
                flex-wrap: nowrap;
                scrollbar-width: none;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 2px;
            }
            .sort-bar::-webkit-scrollbar { display: none; }
            .result-count { display: none; }  /* hide on mobile to save space */

            /* Main content: no horizontal overflow */
            .main-content { padding: 10px; }
            .flash-banner { flex-wrap: wrap; }
        }
        @media (max-width: 420px) {
            .header-inner { gap: 6px; padding: 10px 10px; }
            .logo-area { display: none; }         /* hide logo on very small screens */
            .back-link { font-size: 12px; }
            .search-bar input { font-size: 13px; padding: 8px 10px; }
            .search-bar button { padding: 0 12px; font-size: 12px; }
            .voucher-row { flex-direction: column; }
            .voucher-card { flex-direction: row; }
        }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <span id="sidebarLogo"></span>
            <h2 id="sidebarName"></h2>
        </div>
        <ul>
            <!-- Tabs are dynamically generated in menu.js -->
        </ul>
    </nav>
    <div class="content" style="padding: 0;">
<!-- Top Promo Bar -->
<div class="top-bar">🚗 Free delivery on orders over ₱500 · <a href="/cart.html">View cart</a></div>

<!-- Sticky Header (2 rows) -->
<header class="shop-header">
    <!-- Row 1: Home | Store Name | Vouchers + Cart -->
    <div class="header-row1">
        <a href="/client-dashboard.html" class="back-link">🏠 Home</a>
        <div class="store-name-center">
            <span id="shopStoreName">CarWash</span>
        </div>
        <button class="header-icon-btn" onclick="window.location.href='/vouchers.html'" title="Vouchers">
            <span class="ci">🏷️</span>
            <span>Vouchers</span>
        </button>
        <button class="header-icon-btn" onclick="window.location.href='/cart.html'" title="Cart">
            <span class="ci">🛒</span>
            <span class="header-cart-badge hide" id="headerCartBadge">0</span>
            <span>Cart</span>
        </button>
    </div>
    <!-- Row 2: Search bar -->
    <div class="header-row2">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products &amp; services…" oninput="onSearch()" autocomplete="off">
            <button onclick="onSearch()">🔍 Search</button>
        </div>
    </div>
</header>

<!-- Cart nudge toast -->
<div class="cart-nudge" id="cartNudge">✓ Added to cart!</div>

<!-- Main Content -->
<main class="main-content">

    <!-- Flash Sale Banner — click opens Featured tab -->
    <div class="flash-banner" id="flashBanner" onclick="filterCat(document.querySelector('[data-cat=\'featured\']'), 'featured')" style="cursor:pointer;" title="View Flash Sale Items">
        <span class="flash-label">⚡ FLASH SALE</span>
        <div class="flash-countdown">
            <span class="count-seg" id="cdHr">00</span>
            <span class="count-colon">:</span>
            <span class="count-seg" id="cdMin">00</span>
            <span class="count-colon">:</span>
            <span class="count-seg" id="cdSec">00</span>
        </div>
        <span class="flash-text">Limited-time deals. Up to 30% off selected services.</span>
        <span class="flash-cta">See All ›</span>
    </div>

    <!-- Voucher Strip (horizontal scroll, loaded from API) -->
    <div class="voucher-section">
        <div class="voucher-scroll" id="voucherScroll">
            <!-- skeleton placeholders -->
            <div class="voucher-skeleton"></div>
            <div class="voucher-skeleton"></div>
            <div class="voucher-skeleton"></div>
        </div>
        <button class="more-vouchers-btn" onclick="window.location.href='/vouchers.html'">
            <span>🏷️</span>
            <span>More</span>
        </button>
    </div>

    <!-- Category Filter (toggle: press again to deactivate) -->
    <div class="category-bar" id="categoryBar">
        <button class="cat-btn active" data-cat="all" onclick="filterCat(this, 'all')">⭐ All</button>
        <button class="cat-btn" data-cat="product" onclick="filterCat(this, 'product')">🧴 Products</button>
        <button class="cat-btn" data-cat="featured" onclick="filterCat(this, 'featured')">🔥 Featured</button>
    </div>

    <!-- Sort Bar -->
    <div class="sort-bar">
        <span class="sort-label">Sort by:</span>
        <button class="sort-btn active" onclick="sortBy(this,'default')">Best Match</button>
        <button class="sort-btn" onclick="sortBy(this,'price_asc')">Price: Low→High</button>
        <button class="sort-btn" onclick="sortBy(this,'price_desc')">Price: High→Low</button>
        <button class="sort-btn" onclick="sortBy(this,'name')">Name A-Z</button>
        <span class="result-count" id="resultCount"></span>
    </div>

    <!-- Product Grid -->
    <div class="product-grid" id="productGrid">
        <!-- skeleton loaders -->
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
    </div>

</main>

<!-- Floating Cart Button -->
<button class="floating-cart" id="floatingCart" onclick="window.location.href='/cart.html'" title="View Cart">
    🛒
    <span class="floating-cart-badge hide" id="floatingBadge">0</span>
</button>

<!-- Mobile Bottom Nav — replaced by client-nav.js -->
<nav class="mobile-bottom-nav" style="display:none;"></nav>

<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script>
    // ── State ──────────────────────────────────────────────────────────────
    let allItems = [];      // raw API data
    let filtered = [];      // after filter + sort
    let currentCat = 'all';
    let currentSort = 'default';
    let currentSearch = '';
    let cartCount = 0;

    // ── Init ───────────────────────────────────────────────────────────────
    async function init() {
        await Promise.all([
            loadProducts(),
            loadCartCount(),
            loadBusinessName(),
            loadVouchers()
        ]);
        startCountdown(4 * 3600 + 23 * 60 + 18);
        // If redirected here with featured tab requested
        if (sessionStorage.getItem('openFeatured') === '1') {
            sessionStorage.removeItem('openFeatured');
            const btn = document.querySelector('[data-cat="featured"]');
            if (btn) filterCat(btn, 'featured');
        }
    }

    async function loadBusinessName() {
        try {
            const biz = await API.settings.getBusiness();
            if (biz && biz.business_name) {
                document.getElementById('shopStoreName').textContent = 'Shop Products';
                document.title = `${biz.business_name} - Shop`;
                localStorage.setItem('businessName', biz.business_name);
            }
        } catch {}
    }

    // ── Load vouchers from API ─────────────────────────────────────────────
    async function loadVouchers() {
        const scroll = document.getElementById('voucherScroll');
        try {
            const res = await fetch(`${API_BASE}/coupons`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            if (!res.ok) throw new Error();
            const coupons = await res.json();

            if (coupons.length === 0) {
                scroll.innerHTML = '<div style="font-size:13px;color:#999;padding:10px 0;">No vouchers available right now</div>';
                return;
            }

            scroll.innerHTML = coupons.map(c => {
                const val = c.discount_type === 'percentage'
                    ? `${c.discount_value}% OFF`
                    : '\u20b1' + c.discount_value + ' OFF';
                const minTxt = c.min_spend > 0 ? `Min. \u20b1${c.min_spend}` : 'No min. spend';
                const stockTxt = c.stock !== null ? ` \u00b7 ${c.stock} left` : '';
                return `
                    <div class="voucher-card" onclick="copyCode('${c.code}')" title="Tap to copy: ${c.code}">
                        <span class="vc-off">${val}</span>
                        <div class="vc-label">
                            <strong>${c.description || c.code}</strong>
                            ${minTxt}${stockTxt}
                        </div>
                        <button class="vc-btn" onclick="event.stopPropagation();copyCode('${c.code}')">Collect</button>
                    </div>`;
            }).join('');
        } catch {
            scroll.innerHTML = '<div style="font-size:13px;color:#999;padding:10px 0;">Could not load vouchers</div>';
        }
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code)
            .then(() => showToast('\ud83c\udff7\ufe0f Code "' + code + '" copied! Paste it in your cart.', 'success'))
            .catch(() => showToast('Use code: ' + code, 'success'));
    }


    async function loadProducts() {
        try {
            const res = await fetch(`${API_BASE}/settings/products`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            allItems = data.filter(p => p.is_active !== false); // show only active
            
            const hasFeatured = allItems.some(i => i.is_featured);
            const fb = document.getElementById('flashBanner');
            if (fb) fb.style.display = hasFeatured ? 'flex' : 'none';
            const fCatBtn = document.querySelector('[data-cat="featured"]');
            if (fCatBtn) fCatBtn.style.display = hasFeatured ? 'inline-block' : 'none';

            applyFilters();
        } catch {
            document.getElementById('productGrid').innerHTML = `
                <div class="empty-state">
                    <div class="es-icon">⚠️</div>
                    <h3>Oops! Could not load items.</h3>
                    <p>Please try refreshing the page.</p>
                    <a href="/shop.html">Refresh</a>
                </div>`;
        }
    }

    async function loadCartCount() {
        try {
            const res = await fetch(`${API_BASE}/cart`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            if (!res.ok) return;
            const cart = await res.json();
            cartCount = cart.reduce((s, i) => s + i.quantity, 0);
            updateBadges();
        } catch {}
    }

    function updateBadges() {
        const txt = cartCount > 0 ? (cartCount > 99 ? '99+' : String(cartCount)) : '';
        const show = cartCount > 0;

        const hb = document.getElementById('headerCartBadge');
        hb.textContent = txt;
        hb.classList.toggle('hide', !show);

        const fb = document.getElementById('floatingBadge');
        fb.textContent = txt;
        fb.classList.toggle('hide', !show);

        const mb = document.getElementById('mobileNavBadge');
        mb.textContent = txt;
        mb.classList.toggle('hide', !show);
    }

    // ── Filter & Sort ──────────────────────────────────────────────────────
    // Toggle: press active filter again → deactivate → back to All
    function filterCat(btn, cat) {
        const isAlreadyActive = btn.classList.contains('active') && cat !== 'all';
        if (isAlreadyActive) {
            // Deactivate: reset to "All"
            currentCat = 'all';
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-cat="all"]').classList.add('active');
        } else {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        applyFilters();
    }

    function sortBy(btn, mode) {
        currentSort = mode;
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function onSearch() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
        applyFilters();
    }

    function applyFilters() {
        let items = [...allItems].filter(i => i.type === 'product');

        // Category
        if (currentCat === 'featured') items = items.filter(i => i.is_featured).slice(0, 8);

        // Search
        if (currentSearch) {
            items = items.filter(i =>
                i.name.toLowerCase().includes(currentSearch) ||
                (i.description || '').toLowerCase().includes(currentSearch)
            );
        }

        // Sort
        if (currentSort === 'price_asc') items.sort((a, b) => a.price - b.price);
        else if (currentSort === 'price_desc') items.sort((a, b) => b.price - a.price);
        else if (currentSort === 'name') items.sort((a, b) => a.name.localeCompare(b.name));

        filtered = items;
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('productGrid');
        document.getElementById('resultCount').textContent = `${filtered.length} item${filtered.length !== 1 ? 's' : ''} found`;

        if (filtered.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="es-icon">🔍</div>
                    <h3>No items found</h3>
                    <p>Try adjusting your search or filter.</p>
                    <a href="/shop.html">Clear filters</a>
                </div>`;
            return;
        }

        grid.innerHTML = filtered.map(item => {
            const imgHtml = item.image
                ? `<img src="${item.image}" alt="${item.name}" loading="lazy">`
                : `<span class="product-emoji-placeholder">🧴</span>`;

            return `
                <div class="product-card">
                    <div class="product-img-wrap">
                        ${imgHtml}
                    </div>
                    <div class="card-body">
                        <p class="card-name">${item.name}</p>
                        ${item.description ? `<p class="card-desc">${item.description}</p>` : ''}
                        <div class="card-price-row">
                            <span class="card-price">₱${Number(item.price).toFixed(2)}</span>
                        </div>
                        <button class="card-add-btn"
                            onclick="event.stopPropagation(); addToCart(${item.id}, '${item.name.replace(/'/g, "\\'")}')">
                            + Add to Cart
                        </button>
                    </div>
                </div>`;
        }).join('');
    }

    // ── Actions ────────────────────────────────────────────────────────────
    function cardClick(id, type) {
        // Future: open product detail sheet
    }

    async function addToCart(productId, name) {
        try {
            const res = await fetch(`${API_BASE}/cart`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getToken()}`
                },
                body: JSON.stringify({ product_service_id: productId, quantity: 1 })
            });
            if (!res.ok) throw new Error();
            cartCount++;
            updateBadges();
            showCartNudge(name);
        } catch {
            showToast('Failed to add to cart', 'error');
        }
    }

    function showCartNudge(name) {
        const nudge = document.getElementById('cartNudge');
        nudge.textContent = `✓ "${name.length > 22 ? name.slice(0,22)+'…' : name}" added to cart`;
        nudge.classList.add('show');
        setTimeout(() => nudge.classList.remove('show'), 2200);
    }

    // ── Flash countdown ────────────────────────────────────────────────────
    function startCountdown(secs) {
        function tick() {
            if (secs <= 0) { secs = 0; }
            const h = Math.floor(secs / 3600);
            const m = Math.floor((secs % 3600) / 60);
            const s = secs % 60;
            document.getElementById('cdHr').textContent = String(h).padStart(2,'0');
            document.getElementById('cdMin').textContent = String(m).padStart(2,'0');
            document.getElementById('cdSec').textContent = String(s).padStart(2,'0');
            if (secs > 0) { secs--; setTimeout(tick, 1000); }
        }
        tick();
    }

    init();
</script>
    <script src="/js/menu.js"></script>
    <script src="/js/client-nav.js"></script>
    </div>
</body>
</html>
