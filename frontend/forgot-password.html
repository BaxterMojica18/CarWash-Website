<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Car Wash Management</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .forgot-password-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .forgot-password-container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .forgot-password-box {
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .forgot-password-box h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
            font-size: 24px;
        }

        .forgot-password-box .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.5;
        }

        .forgot-password-box .btn-primary {
            width: 100%;
            margin: 10px 0;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .message-box {
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }

        .message-box.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message-box.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .icon-lock {
            text-align: center;
            font-size: 48px;
            margin-bottom: 15px;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Method Choice Cards */
        .method-cards {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 20px 0;
        }

        .method-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #fafafa;
        }

        .method-card:hover {
            border-color: #b8c4ff;
            background: #f5f7ff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.12);
        }

        .method-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f3ff 0%, #ede7f6 100%);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.18);
        }

        .method-card .method-icon {
            font-size: 32px;
            flex-shrink: 0;
        }

        .method-card .method-info h3 {
            margin: 0 0 4px 0;
            font-size: 15px;
            color: #333;
        }

        .method-card .method-info p {
            margin: 0;
            font-size: 12px;
            color: #888;
            line-height: 1.4;
        }

        .method-card .method-check {
            margin-left: auto;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }

        .method-card.selected .method-check {
            background: #667eea;
            border-color: #667eea;
        }

        .method-card.selected .method-check::after {
            content: '✓';
            color: white;
            font-size: 13px;
            font-weight: 700;
        }

        /* OTP Input Styles */
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 25px 0;
        }

        .otp-inputs input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .otp-inputs input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .otp-inputs input.filled {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .resend-link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #888;
        }

        .resend-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .resend-link a:hover {
            text-decoration: underline;
        }

        .resend-link a.disabled {
            color: #ccc;
            pointer-events: none;
        }

        .email-sent-icon {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }

        .change-method {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
        }

        .change-method a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .change-method a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="forgot-password-page">
    <div class="forgot-password-container">
        <div class="forgot-password-box">
            <div class="icon-lock">🔒</div>
            <h1>Forgot Password?</h1>

            <!-- Step 1: Enter email -->
            <div id="emailStep">
                <p class="subtitle">Enter the email address associated with your account.</p>
                <div id="messageBox" class="message-box"></div>
                <form id="emailForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <button type="submit" id="emailBtn" class="btn-primary">Continue</button>
                </form>
            </div>

            <!-- Step 3b: Enter OTP -->

            <!-- Step 3b: Enter OTP -->
            <div id="otpStep" style="display: none;">
                <p class="subtitle">Enter the 6-digit code sent to <br><strong id="otpEmailDisplay"></strong></p>
                
                <div id="otpMessageBox" class="message-box"></div>
                
                <div class="otp-inputs">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp-1">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp-2">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp-3">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp-4">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp-5">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp-6">
                </div>
                
                <button id="verifyBtn" class="btn-primary" onclick="window.verifyOtp()">Verify Code</button>
                
                <div class="resend-link">
                    Didn't receive the code? <a id="resendOtpBtn" onclick="window.resendOtp()">Resend it</a> <span id="resendTimer"></span>
                </div>
                
                <!-- Removed "Try a different method" because OTP is only option -->

            <div class="back-link">
                <p><a href="/login.html">← Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let userEmail = '';

        // --- Step 1: Email entry ---
        const emailForm = document.getElementById('emailForm');
        
        emailForm.addEventListener('submit', function(e) {
            e.preventDefault();
            userEmail = document.getElementById('email').value;
            if (!userEmail) return;

            // Trigger reset immediately (OTP method only)
            window.sendReset();
        });

        window.sendReset = async function() {
            const emailBtn = document.getElementById('emailBtn');
            const msgBox = document.getElementById('messageBox');
            
            // If called from resend, we don't have to disable emailBtn, but it's safe.
            if(emailBtn) {
                emailBtn.disabled = true;
                emailBtn.textContent = 'Sending...';
            }
            if(msgBox) msgBox.style.display = 'none';

            try {
                // Call our local API which uses standard SMTP natively for otp
                const response = await API.auth.forgotPassword(userEmail, 'otp');
                
                // Hide step 1
                document.getElementById('emailStep').style.display = 'none';
                
                showOtpStep();
            } catch (error) {
                if(msgBox) {
                    msgBox.className = 'message-box error';
                    msgBox.textContent = error.message || 'Something went wrong. Please try again.';
                    msgBox.style.display = 'block';
                }
            } finally {
                if(emailBtn) {
                    emailBtn.disabled = false;
                    emailBtn.textContent = 'Continue';
                }
            }
        }

        // --- Step 2: OTP handling ---
        function showOtpStep() {
            document.getElementById('otpEmailDisplay').textContent = userEmail;
            document.getElementById('otpStep').style.display = 'block';
            document.getElementById('otp-1').focus();
            startResendTimer();
        }

        // OTP inputs auto-advance logic
        const otpInputs = document.querySelectorAll('.otp-inputs input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 0) {
                    e.target.classList.add('filled');
                    if (index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                } else {
                    e.target.classList.remove('filled');
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    otpInputs[index - 1].focus();
                    otpInputs[index - 1].value = '';
                    otpInputs[index - 1].classList.remove('filled');
                }
            });
            
            // Handle paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, 6).replace(/[^0-9]/g, '');
                if (pastedData) {
                    const chars = pastedData.split('');
                    otpInputs.forEach((inp, i) => {
                        if (chars[i]) {
                            inp.value = chars[i];
                            inp.classList.add('filled');
                        }
                    });
                    if (chars.length === 6) {
                        otpInputs[5].focus();
                        window.verifyOtp();
                    } else if (chars.length > 0) {
                        otpInputs[chars.length < 6 ? chars.length : 5].focus();
                    }
                }
            });
        });

        window.verifyOtp = async function() {
            let code = Array.from(otpInputs).map(input => input.value).join('');
            if (code.length < 6) return;

            const verifyBtn = document.getElementById('verifyBtn');
            const otpMsg = document.getElementById('otpMessageBox');
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';
            otpMsg.style.display = 'none';

            try {
                const response = await API.auth.verifyOtp(userEmail, code);
                // The API will return a token. Redirect to reset-password.html with token.
                window.location.href = `/reset-password.html?token=${response.token}`;
            } catch (error) {
                otpMsg.className = 'message-box error';
                otpMsg.textContent = error.message || 'Invalid code.';
                otpMsg.style.display = 'block';
                
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Verify Code';
                
                // Clear inputs
                otpInputs.forEach(input => {
                    input.value = '';
                    input.classList.remove('filled');
                });
                otpInputs[0].focus();
            }
        }

        // Resend Timer Logic
        let resendInterval;
        let countdown = 60;

        function startResendTimer() {
            const btn = document.getElementById('resendOtpBtn');
            const timerObj = document.getElementById('resendTimer');
            btn.classList.add('disabled');
            countdown = 60;
            
            clearInterval(resendInterval);
            timerObj.textContent = `(${countdown}s)`;
            
            resendInterval = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(resendInterval);
                    btn.classList.remove('disabled');
                    timerObj.textContent = '';
                } else {
                    timerObj.textContent = `(${countdown}s)`;
                }
            }, 1000);
        }

        window.resendOtp = async function() {
            const btn = document.getElementById('resendOtpBtn');
            if (btn.classList.contains('disabled')) return;
            
            await window.sendReset(); // This uses selectedMethod, which is 'otp'
            startResendTimer();
        }
    </script>
</body>
</html>
