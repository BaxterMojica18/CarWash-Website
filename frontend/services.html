<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Car Wash Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <span id="sidebarLogo">🚗</span>
            <h2 id="sidebarName">CarWash</h2>
        </div>
        <ul>
            <li><a href="dashboard.html"><span class="icon">■</span> Dashboard</a></li>
            <li><a href="invoices.html"><span class="icon">▣</span> Invoices</a></li>
            <li><a href="order-management.html"><span class="icon">☐</span> Orders</a></li>
            <li><a href="queue-management.html"><span class="icon">⧗</span> Queue</a></li>
            <li><a href="products.html"><span class="icon">▢</span> Products</a></li>
            <li><a href="services.html" class="active"><span class="icon">⚙</span> Services</a></li>
            <li><a href="reports.html"><span class="icon">▤</span> Reports</a></li>
            <li><a href="settings.html"><span class="icon">⚙</span> Settings</a></li>
            <li><a href="login.html"><span class="icon">⎋</span> Logout</a></li>
        </ul>
    </nav>
    <main class="content">
        <header>
            <h1>Services</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button class="btn-primary" onclick="showAddService()" data-permission="manage_products">+ Add Service</button>
                <div class="profile-dropdown">
                    <div class="profile-icon" onclick="toggleProfileMenu()">
                        <img id="profilePhoto" src="" alt="Profile">
                    </div>
                    <div class="profile-menu" id="profileMenu" style="display: none;">
                        <div class="profile-info">
                            <img id="menuProfilePhoto" src="" alt="Profile" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #667eea;">
                            <div>
                                <strong id="profileName">User</strong>
                                <p id="profileRole" style="font-size: 12px; color: #666; margin: 5px 0 0 0;">Role</p>
                            </div>
                        </div>
                        <hr style="margin: 10px 0; border: none; border-top: 1px solid #e0e0e0;">
                        <a href="#" onclick="showEditProfile(); return false;">✏️ Edit Profile</a>
                        <a href="settings.html">⚙️ Settings</a>
                        <a href="login.html" onclick="logout()">🚪 Logout</a>
                    </div>
                </div>
            </div>
        </header>
        
        
        <div class="products-grid" id="servicesGrid">
        </div>
        <div id="addServiceModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeServiceModal()">&times;</span>
                <h2 id="serviceModalTitle">Add Service</h2>
                <form id="serviceForm">
                    <input type="hidden" id="editServiceId">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="serviceName" required>
                    </div>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" id="servicePrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="serviceDescription" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn-primary" id="serviceSubmitBtn">Add Service</button>
                </form>
            </div>
        </div>
    </main>
    
    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditProfile()">&times;</span>
            <h2>Edit Profile</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" id="editRole" required>
                </div>
                <div class="form-group">
                    <label>Profile Photo</label>
                    <input type="file" id="editPhoto" accept="image/*">
                    <div style="margin-top: 10px;">
                        <img id="photoPreview" src="" alt="Preview" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: none; background: #667eea;">
                    </div>
                </div>
                <button type="submit" class="btn-primary">Save Profile</button>
            </form>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/permissions.js"></script>
    <script src="js/services.js"></script>
    <script src="js/profile.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            permissionManager.hideElementsWithoutPermission();
        });
    </script>
</body>
</html>
