<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CarWash Management System</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .signup-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .signup-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .signup-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .signup-box h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .signup-box p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body class="signup-page">
    <div class="signup-container">
        <div class="signup-box">
            <h1>Create Your Account</h1>
            <p>Join us and start managing your car wash business</p>

            <form id="signupForm">
                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Contact Number *</label>
                    <input type="tel" id="phone" placeholder="+63 912 345 6789" required>
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" required>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Continue to Plan Selection</button>
                
                <div style="display: flex; align-items: center; margin: 20px 0;">
                    <hr style="flex: 1; border: none; border-top: 1px solid #ddd;">
                    <span style="padding: 0 10px; color: #888; font-size: 14px;">OR</span>
                    <hr style="flex: 1; border: none; border-top: 1px solid #ddd;">
                </div>
                
                <button type="button" id="googleSignupBtn" style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #333; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 20px; height: 20px;">
                    Sign up with Google
                </button>
            </form>

            <div class="back-link">
                <p style="color: #666;">Already have an account? <a href="/login.html">Login</a></p>
                <a href="/">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { firebaseConfig } from "./js/firebase-config.js";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;

            const userData = {
                fullName: fullName,
                email: email,
                phone: phone,
                password: password // Keep local password for pure local signup
            };

            // Store user data temporarily to continue to plan selection
            localStorage.setItem('signupData', JSON.stringify(userData));
            window.location.href = '/register.html';
        });

        // Add Google Signup Handler
        document.getElementById('googleSignupBtn').addEventListener('click', async function() {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                const idToken = await user.getIdToken();
                
                // Pass the Firebase ID token to the backend
                // This creates the user gracefully in Postgres if they don't exist
                const response = await API.auth.firebaseLogin(idToken, user.email, user.displayName);
                
                // Use the global setToken from api.js
                window.setToken(response.access_token);
                
                localStorage.setItem('userEmail', user.email);
                localStorage.setItem('isDemo', response.is_demo);
                localStorage.setItem('user_permissions', JSON.stringify(response.permissions || []));
                
                // Redirect Google-authenticated user directly to shop
                window.location.href = '/shop.html';
                
            } catch (error) {
                console.error("Google Auth error:", error);
                alert('Google Signup failed: ' + error.message);
            }
        });
    </script>
</body>
</html>
