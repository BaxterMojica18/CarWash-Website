<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Car Wash Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>Car Wash Management</h1>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">Welcome back! Please login to your account</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <p style="text-align: right; margin-bottom: 15px;"><a href="/forgot-password.html" style="color: #667eea; text-decoration: none; font-size: 13px; font-weight: 500;">Forgot Password?</a></p>
                <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
                
                <div style="display: flex; align-items: center; margin: 20px 0;">
                    <hr style="flex: 1; border: none; border-top: 1px solid #ddd;">
                    <span style="padding: 0 10px; color: #888; font-size: 14px;">OR</span>
                    <hr style="flex: 1; border: none; border-top: 1px solid #ddd;">
                </div>
                
                <button type="button" id="googleLoginBtn" style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #333; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 20px; height: 20px;">
                    Sign in with Google
                </button>
                
                <p style="text-align: center; margin-top: 25px; color: #666;">Don't have an account? <a href="/signup.html" style="color: #667eea; text-decoration: none; font-weight: 600;">Sign Up</a></p>
                <p style="text-align: center; margin-top: 10px; color: #666;">Try our <a href="/demo.html" style="color: #667eea; text-decoration: none; font-weight: 600;">Demo Accounts</a></p>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
