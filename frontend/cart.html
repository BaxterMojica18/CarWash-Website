<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart – Car Wash Store</title>
    <meta name="description" content="Review your cart items and checkout securely.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── GLOBAL OVERFLOW LOCK ── */
        html {
            overflow-x: hidden;
            max-width: 100vw;
        }

        :root {
            --brand:       var(--primary-color, #667eea);
            --brand-dark:  var(--sidebar-color, #2c3e50);
            --brand-light: rgba(102,126,234,.08);
            --yellow:      #fbbf24;
            --green:       #16a34a;
            --text-primary:   #111;
            --text-secondary: #555;
            --text-muted:     #999;
            --bg:      #f5f5f5;
            --white:   #fff;
            --border:  #e8e8e8;
            --radius:  10px;
            --shadow:  0 2px 8px rgba(0,0,0,.08);
            --shadow-md: 0 4px 20px rgba(0,0,0,.12);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            max-width: 100vw;
            width: 100%;
        }

        /* ─── HEADER ────────────────────────────────────── */
        .cart-header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 10px 24px !important;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-inner {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            justify-content: space-between !important;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex-wrap: nowrap !important;
        }
        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-secondary);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-radius: 8px;
            transition: background .2s;
            flex-shrink: 0;
        }
        .back-btn:hover { color: var(--brand); background: var(--brand-light); }
        .header-main-content {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 0;
            justify-content: center;
            padding: 0 8px;
        }
        .header-title { 
            font-size: 17px; 
            font-weight: 700; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            text-align: center;
            margin: 0;
        }
        .header-actions { display: flex; width: 44px; justify-content: flex-end; flex-shrink: 0; }
        .hdr-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            border-radius: 50%;
            transition: color .2s, background .2s;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }
        .hdr-action-btn:hover { color: var(--brand); background: var(--brand-light); }

        /* Search field styles */
        .cart-search-box {
            display: flex;
            align-items: center;
            background: #f1f1f1;
            border-radius: 10px;
            padding: 6px 12px;
            flex: 1;
            gap: 8px;
        }
        .cart-search-box input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            min-width: 0;
        }
        .cart-search-box.hide { display: none; }

        .view-voucher {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }
        .view-voucher:hover { color: var(--brand); text-decoration: underline; }

        /* ─── LAYOUT ────────────────────────────────────── */
        .page-body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }
        @media (min-width: 900px) {
            .page-body { grid-template-columns: 1fr 360px; align-items: start; }

        /* Desktop: ensure cart content fills space next to sidebar correctly */
        @media (min-width: 769px) {
            .content { min-width: 0; overflow-x: hidden; }
            .page-body { max-width: 960px; margin: 0 auto; }
        }
        }

        /* ─── SECTION CARD ──────────────────────────────── */
        .section-card {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .section-title {
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-title a, .section-title button {
            font-size: 13px;
            color: var(--brand);
            font-weight: 600;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        /* ─── SELECT-ALL ROW ────────────────────────────── */
        .select-all-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
        }
        .select-all-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--brand);
            cursor: pointer;
        }

        /* ─── SHOP GROUP ────────────────────────────────── */
        .shop-group {
            border-bottom: 6px solid var(--bg);
        }
        .shop-group:last-child { border-bottom: none; }

        .shop-group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 700;
        }
        .shop-badge {
            background: var(--brand);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
        }
        .shop-promo {
            margin-left: auto;
            font-size: 12px;
            color: var(--green);
            font-weight: 600;
        }
        .add-more-link {
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
        }

        /* ─── CART ITEM ROW ─────────────────────────────── */
        .cart-item-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            transition: background .2s;
        }
        .cart-item-row:last-child { border-bottom: none; }
        .cart-item-row:hover { background: #fafafa; }

        .item-checkbox {
            margin-top: 6px;
            width: 18px;
            height: 18px;
            accent-color: var(--brand);
            cursor: pointer;
            flex-shrink: 0;
        }

        .item-thumb {
            width: 76px;
            height: 76px;
            border-radius: 8px;
            background: #f0f0f0;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .item-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-details { flex: 1; min-width: 0; }
        .item-name {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-variant { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }

        .free-shipping-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: #dcfce7;
            color: var(--green);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .item-promo-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--brand);
            font-weight: 600;
            background: var(--brand-light);
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .item-promo-tag .strike { text-decoration: line-through; color: var(--text-muted); font-weight: 400; }

        .item-bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .item-price {
            font-size: 17px;
            font-weight: 800;
            color: var(--brand);
        }

        /* Quantity Stepper */
        .qty-stepper {
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .qty-btn {
            width: 32px;
            height: 32px;
            background: #f5f5f5;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: background .15s, color .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            line-height: 1;
        }
        .qty-btn:hover { background: var(--brand-light); color: var(--brand); }
        .qty-val {
            width: 36px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            border: none;
            outline: none;
            background: white;
            cursor: default;
        }
        .remove-item-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            padding: 4px;
            border-radius: 6px;
            transition: color .2s, background .2s;
        }
        .remove-item-btn:hover { color: var(--brand); background: var(--brand-light); }

        /* ─── EMPTY STATE ───────────────────────────────── */
        .empty-cart-state {
            padding: 60px 20px;
            text-align: center;
        }
        .ecs-icon { font-size: 64px; margin-bottom: 16px; }
        .ecs-title { font-size: 18px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
        .ecs-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
        .ecs-cta {
            display: inline-block;
            padding: 12px 30px;
            background: var(--brand);
            color: white;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: background .2s, transform .15s;
        }
        .ecs-cta:hover { background: var(--brand-dark); transform: translateY(-1px); }

        /* ─── ORDER SUMMARY PANEL ───────────────────────── */
        .summary-panel {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            position: sticky;
            top: 70px;
        }
        .summary-head {
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
        }
        .summary-body { padding: 16px; }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 6px 0;
            color: var(--text-secondary);
        }
        .summary-row.total {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-primary);
            border-top: 2px solid var(--border);
            margin-top: 10px;
            padding-top: 14px;
        }
        .summary-row.total .val { color: var(--brand); }
        .summary-badge {
            background: var(--green);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
        }

        /* Payment Method Selector */
        .payment-section { margin: 16px 0 0; }
        .payment-label { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
        .payment-opts { display: flex; flex-direction: column; gap: 8px; }
        .pay-opt {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: border-color .2s, background .2s;
        }
        .pay-opt:hover { border-color: var(--brand); background: var(--brand-light); }
        .pay-opt.selected { border-color: var(--brand); background: var(--brand-light); }
        .pay-opt input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: var(--brand);
            cursor: pointer;
            flex-shrink: 0;
        }
        .pay-opt-info { flex: 1; }
        .pay-opt-name { font-size: 14px; font-weight: 600; }
        .pay-opt-sub { font-size: 12px; color: var(--text-muted); }
        .pay-opt-icon { font-size: 22px; }

        /* Voucher input */
        .voucher-input-row {
            display: flex;
            gap: 8px;
            margin: 14px 0;
        }
        .voucher-input-row input {
            flex: 1;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            padding: 9px 12px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            transition: border-color .2s;
        }
        .voucher-input-row input:focus { border-color: var(--brand); }
        .voucher-apply-btn {
            padding: 9px 16px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: background .2s;
        }
        .voucher-apply-btn:hover { background: var(--brand-dark); }

        /* Checkout CTA */
        .checkout-cta {
            width: 100%;
            padding: 16px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            font-family: inherit;
            transition: background .2s, transform .15s, box-shadow .2s;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .checkout-cta:hover {
            background: var(--brand-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(240,45,85,.4);
        }
        .checkout-cta:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        .stripe-cta {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            background: white;
            color: #3a3a3a;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: border-color .2s, background .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .stripe-cta:hover { border-color: #635bff; background: #f8f8ff; }

        /* ─── MOBILE STICKY CHECKOUT BAR ──────────────────── */
        .mobile-checkout-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            background: white;
            border-top: 1px solid var(--border);
            padding: 10px 16px env(safe-area-inset-bottom, 10px);
            z-index: 9999;
            align-items: center;
            gap: 12px;
            box-shadow: 0 -2px 12px rgba(0,0,0,.1);
            overflow: hidden;
        }
        .mco-info { flex: 1; min-width: 0; }
        .mco-label { font-size: 12px; color: var(--text-muted); }
        .mco-total { font-size: 17px; font-weight: 800; color: var(--brand); }
        .mco-btn {
            padding: 14px 24px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }



        /* Mobile nav bottom */
        .mobile-bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; width: 100vw; background: white;
            border-top: 1px solid var(--border); z-index: 9999; padding: 6px 0 env(safe-area-inset-bottom, 10px);
            box-shadow: 0 -2px 12px rgba(0,0,0,.08); overflow: hidden;
        }
        .mobile-bottom-nav .nav-items { display: flex; justify-content: space-around; width: 100%; }
        .mobile-bottom-nav .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 3px; font-size: 10px; color: var(--text-muted); cursor: pointer; text-decoration: none; padding: 6px 4px;
            min-width: 0;
        }
        .mobile-bottom-nav .nav-item.active { color: var(--brand); }
        .mobile-bottom-nav .nav-item .ni { font-size: 20px; position: relative; line-height: 1; }
        .mobile-bottom-nav .nav-item .ni .nb {
            position: absolute; top: -4px; right: -8px; background: var(--brand); color: white; border-radius: 50%;
            min-width: 16px; height: 16px; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center;
        }
        .nb.hide { display: none; }

        @media (max-width: 768px) {
            .mobile-checkout-bar { display: flex; bottom: 65px; box-shadow: 0 -4px 10px rgba(0,0,0,.04); }
            .mobile-bottom-nav { display: none !important; }
            .page-body { padding-bottom: 150px; }
            .item-thumb { width: 64px; height: 64px; font-size: 28px; }
            .item-price { font-size: 15px; }
        }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <span id="sidebarLogo"></span>
            <h2 id="sidebarName"></h2>
        </div>
        <ul>
            <!-- Tabs are dynamically generated in menu.js -->
        </ul>
    </nav>
    <div class="content" style="padding: 0;">
<!-- Sticky Header -->
<header class="cart-header">
    <div class="header-inner">
        <button class="back-btn" onclick="window.location.href='/shop.html'" title="Back to Shop">←</button>
        <div class="header-main-content">
            <h1 class="header-title" id="cartTitle">Cart</h1>
            <div class="cart-search-box hide" id="cartSearchBox">
                <input type="text" id="cartSearchInput" placeholder="Search in cart..." oninput="onCartSearch()" autocomplete="off">
            </div>
        </div>

        </div>

</header>

<div class="page-body">
    <!-- LEFT: Cart Items -->
    <div id="cartSection">
        <!-- rendered by JS -->
    </div>

    <!-- RIGHT: Order Summary -->
    <div class="summary-panel" id="summaryPanel" style="display:none;">
        <div class="summary-head">Order Summary</div>
        <div class="summary-body">
            <!-- Voucher -->
            <div class="voucher-input-row">
                <input type="text" id="voucherInput" placeholder="Enter voucher / promo code">
                <button class="voucher-apply-btn" onclick="applyVoucher()">Apply</button>
            </div>

            <!-- Summary Rows -->
            <div class="summary-row">
                <span>Subtotal (<span id="summaryItemCount">0</span> items)</span>
                <span>₱<span id="summarySubtotal">0.00</span></span>
            </div>
            <div class="summary-row">
                <span>Shipping Fee</span>
                <span id="shippingFeeRow">₱0.00 <span class="summary-badge">FREE</span></span>

            <div class="summary-row" id="discountRow" style="display:none; color: var(--green);">
                <span>Voucher Discount</span>
                <span>-₱<span id="discountAmt">0.00</span></span>
            </div>
            <div class="summary-row total">
                <span>Total</span>

            <!-- Payment -->

                🛒 Check Out (<span id="ctaCount">0</span>)
            </button>
            <button class="stripe-cta" onclick="window.location.href='/checkout.html'">
                💳 Pay with Card (Stripe)
            </button>
        </div>
    </div>
</div>

<!-- Mobile Sticky Bar -->
<div class="mobile-checkout-bar" id="mobileCOBar">
    <div class="mco-info">
        <div class="mco-label">Total</div>
        <div class="mco-total">₱<span id="mobileTotal">0.00</span></div>
    </div>
    <button class="mco-btn" onclick="checkout()">Check Out (<span id="mobileCOCount">0</span>)</button>
</div>

<!-- Bottom Navbar -->
<nav class="mobile-bottom-nav" id="mobileBottomNav">
    <div class="nav-items">
        <a href="/client-dashboard.html" class="nav-item">
            <span class="ni">🏠</span><span>Home</span>
        </a>
        <a href="/shop.html" class="nav-item">
            <span class="ni">🛍️</span><span>Shop</span>
        </a>
        <a href="/reserve.html" class="nav-item">
            <span class="ni">📅</span><span>Reserve</span>
        </a>
        <a href="/cart.html" class="nav-item active">
            <span class="ni">🛒 <span class="nb hide" id="mobileNavBadge">0</span></span><span>Cart</span>
        </a>
        <a href="/client-dashboard.html#account" class="nav-item">
            <span class="ni">👤</span><span>Account</span>
        </a>
    </div>
</nav>

<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script>
    let cartItems = [];
    let paymentMethods = [];
    let discount = 0;
    let cartSearchQuery = '';

    async function init() {
        await Promise.all([loadCart(), loadPaymentMethods()]);
    }

    // ── Load cart ──────────────────────────────────────────────────────────
    async function loadCart() {
        try {
            const res = await fetch(`${API_BASE}/cart`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            if (!res.ok) {
                if (res.status === 401) { window.location.href = '/login.html'; return; }
                throw new Error();
            }
            cartItems = await res.json();
            renderCart();
        } catch {
            showToast('Failed to load cart', 'error');
        }
    }

    async function loadPaymentMethods() {
        try {
            const res = await fetch(`${API_BASE}/settings/payment-methods`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            if (!res.ok) return;
            paymentMethods = (await res.json()).filter(pm => pm.is_active);
            renderPaymentMethods();
        } catch {}
    }

    function renderPaymentMethods() {
        const container = document.getElementById('paymentOpts');
        const defaults = [
            { name: 'Cash / Counter', icon: '💵', sub: 'Pay upon pickup', value: 'cash' },
            { name: 'QR Code', icon: '📱', sub: 'GCash / PayMaya / InstaPay', value: 'qr' }
        ];

        const methods = paymentMethods.length
            ? paymentMethods.map((pm, i) => ({ name: pm.name, icon: pm.icon || '💳', sub: '', value: pm.name.toLowerCase().replace(/ /g,'_'), isFirst: i === 0 }))
            : defaults;

        container.innerHTML = methods.map((m, i) => `
            <label class="pay-opt ${i===0?'selected':''}" id="payOpt${i}" onclick="selectPayOpt(${i}, '${m.value}')">
                <input type="radio" name="payment" value="${m.value}" ${i===0?'checked':''}>
                <span class="pay-opt-icon">${m.icon}</span>
                <div class="pay-opt-info">
                    <div class="pay-opt-name">${m.name}</div>
                    ${m.sub ? `<div class="pay-opt-sub">${m.sub}</div>` : ''}
                </div>
            </label>
        `).join('');
    }

    function selectPayOpt(idx, value) {
        document.querySelectorAll('.pay-opt').forEach((el, i) => el.classList.toggle('selected', i === idx));
        document.querySelectorAll('input[name="payment"]')[idx].checked = true;
    }

    // ── Render ─────────────────────────────────────────────────────────────
    function toggleCartSearch() {
        const title = document.getElementById('cartTitle');
        const box = document.getElementById('cartSearchBox');
        const input = document.getElementById('cartSearchInput');
        const searchBtn = document.getElementById('searchBtn');

        if (box.classList.contains('hide')) {
            box.classList.remove('hide');
            title.style.display = 'none';
            searchBtn.textContent = '✕';
            input.focus();
        } else {
            box.classList.add('hide');
            title.style.display = 'block';
            searchBtn.textContent = '🔍';
            input.value = '';
            cartSearchQuery = '';
            renderCart();
        }
    }

    function onCartSearch() {
        cartSearchQuery = document.getElementById('cartSearchInput').value.toLowerCase().trim();
        renderCart();
    }

    function renderCart() {
        const section = document.getElementById('cartSection');
        const summary = document.getElementById('summaryPanel');
        const mBar = document.getElementById('mobileCOBar');

        let displayItems = cartItems;
        if (cartSearchQuery) {
            displayItems = cartItems.filter(item => {
                const name = item.product_service ? item.product_service.name.toLowerCase() : '';
                return name.includes(cartSearchQuery);
            });
        }

        if (cartItems.length === 0) {
            section.innerHTML = `
                <div class="section-card">
                    <div class="empty-cart-state">
                        <div class="ecs-icon">🛒</div>
                        <div class="ecs-title">Your cart is empty</div>
                        <div class="ecs-sub">Looks like you haven't added anything yet.</div>
                        <a href="/shop.html" class="ecs-cta">Continue Shopping →</a>
                    </div>
                </div>`;
            summary.style.display = 'none';
            mBar.style.display = 'none';
            return;
        }

        // Group items (all under one shop for now)
        const html = `
            <div class="section-card">
                <div class="select-all-row">
                    <input type="checkbox" id="selectAll" checked onchange="toggleSelectAll(this.checked)">
                    <label for="selectAll" style="cursor:pointer; font-size:14px; font-weight:600;">Select All (${cartItems.length})</label>
                </div>

                <div class="shop-group">
                    <div class="shop-group-header">
                        <span class="shop-badge">🚗</span>
                        <span id="shopGroupName">CarWash Store</span>
                        <span class="shop-promo">📦 Free shipping above ₱500</span>
                        <span class="add-more-link" onclick="window.location.href='/shop.html'">Add more ›</span>
                    </div>

                    ${displayItems.length === 0 ? `<div style="padding:40px 20px; text-align:center; color:#999;">No items match "${cartSearchQuery}"</div>` : ''}

                    ${displayItems.map(item => `
                        <div class="cart-item-row" id="item-row-${item.id}">
                            <input type="checkbox" class="item-checkbox item-check" data-id="${item.id}" checked>
                            <div class="item-thumb">
                                ${item.product_service && item.product_service.image
                                    ? `<img src="${item.product_service.image}" alt="${item.product_service.name}">`
                                    : (item.product_service && item.product_service.type === 'service' ? '🚿' : '🧴')}
                            </div>
                            <div class="item-details">
                                <div class="item-name">${item.product_service ? item.product_service.name : 'Item'}</div>
                                <div class="item-variant">${item.product_service && item.product_service.type === 'service' ? 'Service' : 'Product'}</div>
                                <div class="free-shipping-tag">🚚 FREE SHIPPING</div>
                                <div class="item-bottom-row">
                                    <span class="item-price">₱${Number(item.price_at_add).toFixed(2)}</span>
                                    <div class="qty-stepper">
                                        <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
                                        <span class="qty-val">${item.quantity}</span>
                                        <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
                                    </div>
                                    <button class="remove-item-btn" onclick="removeItem(${item.id})" title="Remove">🗑️</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        section.innerHTML = html;
        summary.style.display = 'block';
        mBar.style.display = 'flex';

        // Load biz name
        try {
            const saved = localStorage.getItem('businessName');
            if (saved) document.getElementById('shopGroupName').textContent = saved + ' Store';
        } catch {}

        updateSummary();
    }

    function updateSummary() {
        const checkedIds = getCheckedIds();
        const selected = cartItems.filter(i => checkedIds.has(i.id));
        const subtotal = selected.reduce((s, i) => s + (i.quantity * i.price_at_add), 0);
        const discounted = Math.max(0, subtotal - discount);
        const count = checkedIds.size;

        document.getElementById('summaryItemCount').textContent = count;
        document.getElementById('summarySubtotal').textContent = subtotal.toFixed(2);
        document.getElementById('summaryTotal').textContent = discounted.toFixed(2);
        document.getElementById('ctaCount').textContent = count;
        document.getElementById('mobileTotal').textContent = discounted.toFixed(2);
        document.getElementById('mobileCOCount').textContent = count;

        const totalCartItems = cartItems.reduce((acc, i) => acc + i.quantity, 0);
        const navBadge = document.getElementById('mobileNavBadge');
        if (navBadge) {
            navBadge.textContent = totalCartItems > 99 ? '99+' : totalCartItems;
            navBadge.classList.toggle('hide', totalCartItems === 0);
        }

        const isChecked = count > 0 && count === cartItems.length;
        const selectAll = document.getElementById('selectAll');
        if (selectAll) selectAll.checked = isChecked;

        const discRow = document.getElementById('discountRow');
        if (discount > 0) {
            discRow.style.display = 'flex';
            document.getElementById('discountAmt').textContent = discount.toFixed(2);
        } else {
            discRow.style.display = 'none';
        }

        const cta = document.getElementById('checkoutBtn');
        if (cta) cta.disabled = count === 0;
    }

    function getCheckedIds() {
        const checked = document.querySelectorAll('.item-check:checked');
        return new Set([...checked].map(c => parseInt(c.dataset.id)));
    }

    function toggleSelectAll(checked) {
        document.querySelectorAll('.item-check').forEach(c => c.checked = checked);
        updateSummary();
    }

    // ── Actions ────────────────────────────────────────────────────────────
    async function updateQty(itemId, qty) {
        if (qty < 1) {
            await removeItem(itemId);
            return;
        }
        try {
            await fetch(`${API_BASE}/cart/${itemId}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getToken()}`
                },
                body: JSON.stringify({ quantity: qty })
            });
            await loadCart();
        } catch {
            showToast('Failed to update quantity', 'error');
        }
    }

    async function removeItem(itemId) {
        try {
            await fetch(`${API_BASE}/cart/${itemId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            cartItems = cartItems.filter(i => i.id !== itemId);
            renderCart();
            showToast('Item removed', 'success');
        } catch {
            showToast('Failed to remove item', 'error');
        }
    }

    function confirmClearAll() {
        const checkedIds = getCheckedIds();
        if (checkedIds.size === 0) { showToast('No items selected', 'error'); return; }
        if (!confirm(`Remove ${checkedIds.size} selected item(s) from cart?`)) return;
        const toRemove = [...checkedIds];
        Promise.all(toRemove.map(id =>
            fetch(`${API_BASE}/cart/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${getToken()}` }
            })
        )).then(() => loadCart());
    }

    async function applyVoucher() {
        const code = document.getElementById('voucherInput').value.trim().toUpperCase();
        if (!code) { showToast('Please enter a coupon code', 'error'); return; }

        const applyBtn = document.querySelector('.voucher-apply-btn');
        const originalText = applyBtn.textContent;
        applyBtn.textContent = '...';
        applyBtn.disabled = true;

        // Calculate current cart subtotal for validation
        const checkedIds = getCheckedIds();
        const selected = cartItems.filter(i => checkedIds.has(i.id));
        const subtotal = selected.reduce((s, i) => s + (i.quantity * i.price_at_add), 0);

        try {
            const res = await fetch(`${API_BASE}/coupons/validate`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getToken()}`
                },
                body: JSON.stringify({ code, cart_total: subtotal })
            });

            const data = await res.json();
            if (!res.ok) {
                showToast(data.detail || 'Invalid coupon code', 'error');
                return;
            }

            discount = data.discount_amount;
            const label = data.discount_type === 'percentage'
                ? `${data.discount_value}% off`
                : `\u20b1${data.discount_value} off`;
            showToast(`\ud83c\udff7\ufe0f "${code}" applied! ${label} = -\u20b1${discount.toFixed(2)}`, 'success');
            updateSummary();
        } catch {
            showToast('Failed to validate coupon. Please try again.', 'error');
        } finally {
            applyBtn.textContent = originalText;
            applyBtn.disabled = false;
        }
    }


    async function checkout() {
        const checkedIds = getCheckedIds();
        if (checkedIds.size === 0) { showToast('Please select items to checkout', 'error'); return; }
        const paymentEl = document.querySelector('input[name="payment"]:checked');
        const paymentMethod = paymentEl ? paymentEl.value : 'cash';

        const btn = document.getElementById('checkoutBtn');
        if (btn) { btn.disabled = true; btn.textContent = 'Placing Order…'; }

        try {
            const res = await fetch(`${API_BASE}/orders`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getToken()}`
                },
                body: JSON.stringify({ payment_method: paymentMethod })
            });
            if (!res.ok) throw new Error();
            showToast('🎉 Order placed successfully!', 'success');
            
            setTimeout(() => {
                const navHome = document.querySelector('a[href="/client-dashboard.html"]').classList;
                window.location.href = '/client-dashboard.html';
            }, 1500);
        } catch {
            showToast('Failed to place order', 'error');
            if (btn) { btn.disabled = false; btn.innerHTML = '🛒 Check Out (<span id="ctaCount">0</span>)'; updateSummary(); }
        }
    }

    // Listen for checkbox changes
    document.addEventListener('change', e => {
        if (e.target.classList.contains('item-check')) updateSummary();
    });

    init();
</script>
    <script src="/js/menu.js"></script>
    <script src="/js/client-nav.js"></script>
    </div>
</body>
</html>
