<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Vouchers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overflow-x: hidden; max-width: 100vw; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }

        /* Header */
        .page-header {
            background: white;
            border-bottom: 1px solid #e8e8e8;
            padding: 10px 24px !important;
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            justify-content: space-between !important;
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100vw !important;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            flex-wrap: nowrap !important;
        }
        .page-header .back-btn {
            background: none; border: none; cursor: pointer;
            font-size: 20px; color: #555; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: flex-start;
            border-radius: 8px; transition: background .2s;
            flex-shrink: 0;
        }
        .page-header .back-btn:hover { background: #fee; color: #f02d55; }
        .header-main-content {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 0;
            justify-content: center;
            padding: 0 8px;
        }
        .header-title { 
            font-size: 17px; 
            font-weight: 700; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            text-align: center;
            margin: 0;
        }
        .header-actions { display: flex; width: 44px; justify-content: flex-end; flex-shrink: 0; }
        .hdr-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            border-radius: 50%;
            transition: color .2s, background .2s;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }
        .hdr-action-btn:hover { color: #f02d55; background: #fee; }

        .search-box {
            display: flex;
            align-items: center;
            background: #f1f1f1;
            border-radius: 10px;
            padding: 6px 12px;
            flex: 1;
        }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            min-width: 0;
        }
        .search-box.hide { display: none; }

        /* Coupon list */
        .coupon-list {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 24px 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .coupon-card {
            background: white;
            border-radius: 10px;
            border: 1px solid #e8e8e8;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: box-shadow .2s;
            cursor: pointer;
        }
        .coupon-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); transform: translateY(-1px); }

        .cc-code {
            background: #fff0f3;
            color: #f02d55;
            border: 1.5px dashed #f02d55;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            white-space: nowrap;
            min-width: 120px;
            text-align: center;
        }
        .cc-info { flex: 1; min-width: 0; }
        .cc-desc { font-size: 14px; font-weight: 600; color: #111; }
        .cc-meta { font-size: 12px; color: #888; margin-top: 4px; display: flex; flex-wrap: wrap; gap: 10px; }
        .cc-tag {
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #555;
        }
        .cc-tag.blue { background: #dbeafe; color: #1e40af; }
        .cc-tag.yellow { background: #fef9c3; color: #713f12; }

        .cc-discount {
            font-size: 20px;
            font-weight: 800;
            color: #111;
            white-space: nowrap;
        }
        .cc-discount span { font-size: 13px; color: #888; font-weight: 500; }

        .cc-actions { display: flex; gap: 8px; }
        .action-btn {
            padding: 8px 16px;
            background: #f02d55;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            transition: background .2s;
        }
        .action-btn:hover { background: #c4002b; }

        /* Empty */
        .empty-coupons {
            text-align: center; padding: 60px 20px;
            color: #999; background: white; border-radius: 10px;
            border: 1px solid #e8e8e8;
        }
        .empty-coupons .ei { font-size: 56px; margin-bottom: 12px; }
        .empty-coupons p { font-size: 15px; }

        @media (max-width: 600px) {
            body { padding-bottom: 70px; }
            .page-header { padding: 12px 16px; }
            .coupon-list { padding-left: 16px; padding-right: 16px; }
            .coupon-card { flex-wrap: wrap; gap: 12px; }
            .cc-actions { width: 100%; justify-content: flex-end; }
        }

        /* Mobile nav bottom */
        .mobile-bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; width: 100vw; background: white;
            border-top: 1px solid #e8e8e8; z-index: 9999; padding: 6px 0 env(safe-area-inset-bottom, 10px);
            box-shadow: 0 -2px 12px rgba(0,0,0,.08); overflow: hidden;
        }
        .mobile-bottom-nav .nav-items { display: flex; justify-content: space-around; width: 100%; }
        .mobile-bottom-nav .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 3px; font-size: 10px; color: #999; cursor: pointer; text-decoration: none; padding: 6px 4px;
            min-width: 0;
        }
        .mobile-bottom-nav .nav-item.active { color: #f02d55; }
        .mobile-bottom-nav .nav-item .ni { font-size: 20px; position: relative; line-height: 1; }
        .mobile-bottom-nav .nav-item .ni .nb {
            position: absolute; top: -4px; right: -8px; background: #f02d55; color: white; border-radius: 50%;
            min-width: 16px; height: 16px; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center;
        }
        .nb.hide { display: none; }
        
        @media (max-width: 680px) {
            .mobile-bottom-nav { display: block; }
        }

        /* Category filters */
        .category-bar {
            display: flex; gap: 10px; overflow-x: auto; padding: 12px 16px;
            max-width: 100vw; margin: 0; scrollbar-width: none; -webkit-overflow-scrolling: touch;
            box-sizing: border-box;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .category-bar::after { content: ''; padding-right: 16px; flex-shrink: 0; }
        .cat-btn {
            background: white; border: 1.5px solid #e8e8e8; padding: 8px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 600; color: #555; cursor: pointer; white-space: nowrap; font-family: inherit; transition: all .2s;
            flex-shrink: 0;
        }
        .cat-btn.active { background: #fff0f3; color: #f02d55; border-color: #f02d55; }
    </style>
</head>
<body>

<header class="page-header">
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="header-main-content">
        <h1 class="header-title" id="voucherTitle">🏷️ Available Vouchers</h1>
        <div class="search-box hide" id="voucherSearchBox">
            <input type="text" id="voucherSearchInput" placeholder="Search vouchers..." oninput="onVoucherSearch()" autocomplete="off">
        </div>
    </div>
    <div class="header-actions">
        <button class="hdr-action-btn" id="searchBtn" onclick="toggleVoucherSearch()">🔍</button>
    </div>
</header>

<div class="category-bar" id="categoryBar">
    <button class="cat-btn active" onclick="filterVouchers(this, 'all')">⭐ All</button>
    <button class="cat-btn" onclick="filterVouchers(this, 'product')">🧴 Product Vouchers</button>
    <button class="cat-btn" onclick="filterVouchers(this, 'service')">🚿 Service Vouchers</button>
</div>

<div class="coupon-list" id="couponList">
    <div class="empty-coupons"><div class="ei">⏳</div><p>Loading vouchers…</p></div>
</div>

<!-- Bottom Navbar -->
<nav class="mobile-bottom-nav">
    <div class="nav-items">
        <a href="/client-dashboard.html" class="nav-item">
            <span class="ni">🏠</span><span>Home</span>
        </a>
        <a href="/shop.html" class="nav-item">
            <span class="ni">🛍️</span><span>Shop</span>
        </a>
        <a href="/reserve.html" class="nav-item">
            <span class="ni">📅</span><span>Reserve</span>
        </a>
        <a href="/cart.html" class="nav-item">
            <span class="ni">🛒 <span class="nb hide" id="mobileNavBadge"></span></span><span>Cart</span>
        </a>
        <a href="/client-dashboard.html#account" class="nav-item">
            <span class="ni">👤</span><span>Account</span>
        </a>
    </div>
</nav>

<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script>
    let allCoupons = [];
    let cartCount = 0;
    let voucherSearchQuery = '';
    let currentFilterType = 'all';

    async function loadCoupons() {
        fetchCartCount(); // trigger parallel background load
        try {
            const res = await fetch(`${API_BASE}/coupons`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            if (!res.ok) throw new Error();
            allCoupons = await res.json();
            renderCoupons(allCoupons);
        } catch {
            document.getElementById('couponList').innerHTML =
                `<div class="empty-coupons"><div class="ei">⚠️</div><p>Failed to load vouchers. Please refresh.</p></div>`;
        }
    }

    function toggleVoucherSearch() {
        const title = document.getElementById('voucherTitle');
        const box = document.getElementById('voucherSearchBox');
        const input = document.getElementById('voucherSearchInput');
        const searchBtn = document.getElementById('searchBtn');

        if (box.classList.contains('hide')) {
            box.classList.remove('hide');
            title.style.display = 'none';
            searchBtn.textContent = '✕';
            input.focus();
        } else {
            box.classList.add('hide');
            title.style.display = 'block';
            searchBtn.textContent = '🔍';
            input.value = '';
            voucherSearchQuery = '';
            applyAllFilters();
        }
    }

    function onVoucherSearch() {
        voucherSearchQuery = document.getElementById('voucherSearchInput').value.toLowerCase().trim();
        applyAllFilters();
    }

    function filterVouchers(btn, type) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilterType = type;
        applyAllFilters();
    }

    function applyAllFilters() {
        let filtered = allCoupons;

        // Apply Category Filter
        if (currentFilterType === 'product') {
            filtered = filtered.filter(c => (c.description || '').toLowerCase().includes('product') || c.code.toLowerCase().includes('prod'));
        } else if (currentFilterType === 'service') {
            filtered = filtered.filter(c => (c.description || '').toLowerCase().includes('service') || c.code.toLowerCase().includes('serv'));
        }

        // Apply Search Filter
        if (voucherSearchQuery) {
            filtered = filtered.filter(c => 
                c.code.toLowerCase().includes(voucherSearchQuery) || 
                (c.description || '').toLowerCase().includes(voucherSearchQuery)
            );
        }

        renderCoupons(filtered);
    }

    function renderCoupons(coupons) {
        const list = document.getElementById('couponList');
        
        // Vouchers endpoint already filters active, unexpired, and in-stock vouchers for clients.
        if (coupons.length === 0) {
            list.innerHTML = `<div class="empty-coupons"><div class="ei">🏷️</div><p>No vouchers available at the moment.</p></div>`;
            return;
        }

        list.innerHTML = coupons.map(c => {
            const stockLeft = c.stock !== null ? c.stock : null;
            const discLabel = c.discount_type === 'percentage'
                ? `${c.discount_value}% OFF`
                : `₱${c.discount_value} OFF`;

            let expiryTag = '';
            if (c.expires_at) {
                const expDate = new Date(c.expires_at).toLocaleDateString('en-PH', {month:'short',day:'numeric',year:'numeric'});
                expiryTag = `<span class="cc-tag yellow">⏰ Expires ${expDate}</span>`;
            }

            return `
                <div class="coupon-card" id="cc-${c.id}" onclick="copyCode('${c.code}')" title="Tap to copy code">
                    <div class="cc-code">${c.code}</div>
                    <div class="cc-info">
                        <div class="cc-desc">${c.description || 'No description'}</div>
                        <div class="cc-meta">
                            ${c.min_spend > 0 ? `<span class="cc-tag blue">Min ₱${c.min_spend}</span>` : ''}
                            ${stockLeft !== null ? `<span class="cc-tag">📦 ${stockLeft} left</span>` : '<span class="cc-tag">Unlimited stock</span>'}
                            ${expiryTag}
                        </div>
                    </div>
                    <div class="cc-discount">${discLabel}<br><span>${c.discount_type === 'percentage' ? 'off total' : 'flat off'}</span></div>
                    <div class="cc-actions">
                        <button class="action-btn" onclick="event.stopPropagation();copyCode('${c.code}')">Collect / Copy</button>
                    </div>
                </div>`;
        }).join('');
    }

    async function fetchCartCount() {
        try {
            const res = await fetch(`${API_BASE}/cart`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
            if (res.ok) {
                const cart = await res.json();
                cartCount = cart.reduce((s, i) => s + i.quantity, 0);
                const badge = document.getElementById('mobileNavBadge');
                if (badge) {
                    badge.textContent = cartCount > 99 ? '99+' : cartCount;
                    badge.classList.toggle('hide', cartCount === 0);
                }
            }
        } catch {}
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code).then(() => {
            showToast(`🏷️ Code "${code}" copied! Paste it in your cart.`, 'success');
        }).catch(() => {
            showToast(`Use code: ${code}`, 'success');
        });
    }

    loadCoupons();
</script>
</body>
</html>
