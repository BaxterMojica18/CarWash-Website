<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Management - Car Wash</title>
    <link rel="stylesheet" href="css/style.css">
    <script>(function(){if(localStorage.getItem('sidebarCollapsed')==='1')document.documentElement.classList.add('sidebar-pre-collapsed');})()</script>
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <span id="sidebarLogo"></span>
            <h2 id="sidebarName"></h2>
        </div>
        <ul>
            <!-- Tabs are dynamically generated in menu.js -->
        </ul>
    </nav>
    <main class="content">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Service Queue Management</h1>
            <div class="profile-dropdown">
                <div class="profile-icon" onclick="toggleProfileMenu()">
                    <img id="profilePhoto" src="" alt="Profile">
                </div>
                <div class="profile-menu" id="profileMenu" style="display: none;">
                    <div class="profile-info">
                        <img id="menuProfilePhoto" src="" alt="Profile" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #667eea;">
                        <div>
                            <strong id="profileName">User</strong>
                            <p id="profileRole" style="font-size: 12px; color: #666; margin: 5px 0 0 0;">Role</p>
                            <p id="profileBiz" style="font-size: 11px; margin-top: 5px; color: #667eea; background: rgba(102, 126, 234, 0.1); padding: 2px 5px; border-radius: 4px; display: none; font-weight: bold;"></p>
                        </div>
                    </div>
                    <hr style="margin: 10px 0; border: none; border-top: 1px solid #e0e0e0;">
                    <a href="#" onclick="showEditProfile(); return false;">&#9999;&#65039; Edit Profile</a>
                    <a href="settings.html">&#9881;&#65039; Settings</a>
                    <a href="login.html" onclick="logout()">&#128682; Logout</a>
                </div>
            </div>
        </header>

        <div class="filters" style="display: flex; gap: 10px; margin-bottom: 30px; padding: 15px; border-radius: 15px; flex-wrap: wrap; background: white; border: 1px solid #e0e0e0; justify-content: center;">
            <button onclick="filterReservations('all')" class="filter-btn active" data-filter="all" style="padding: 12px 20px; border: 2px solid var(--sidebar-color, #667eea); cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 600; white-space: nowrap; transition: all 0.3s ease; background: var(--sidebar-color, #667eea); color: white; box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);">All Reservations</button>
            <button onclick="filterReservations('pending')" class="filter-btn" data-filter="pending" style="padding: 12px 20px; border: 2px solid #e0e0e0; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 600; white-space: nowrap; transition: all 0.3s ease; background: white; color: #333;">Pending</button>
            <button onclick="filterReservations('accepted')" class="filter-btn" data-filter="accepted" style="padding: 12px 20px; border: 2px solid #e0e0e0; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 600; white-space: nowrap; transition: all 0.3s ease; background: white; color: #333;">Accepted</button>
            <button onclick="filterReservations('in_progress')" class="filter-btn" data-filter="in_progress" style="padding: 12px 20px; border: 2px solid #e0e0e0; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 600; white-space: nowrap; transition: all 0.3s ease; background: white; color: #333;">In Progress</button>
            <button onclick="filterReservations('completed')" class="filter-btn" data-filter="completed" style="padding: 12px 20px; border: 2px solid #e0e0e0; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 600; white-space: nowrap; transition: all 0.3s ease; background: white; color: #333;">Completed</button>
            <button onclick="filterReservations('delayed')" class="filter-btn" data-filter="delayed" style="padding: 12px 20px; border: 2px solid #e0e0e0; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 600; white-space: nowrap; transition: all 0.3s ease; background: white; color: #333;">Delayed</button>
            <button onclick="filterReservations('cancelled')" class="filter-btn" data-filter="cancelled" style="padding: 12px 20px; border: 2px solid #e0e0e0; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 600; white-space: nowrap; transition: all 0.3s ease; background: white; color: #333;">Cancelled</button>
            <select id="location-select" onchange="loadQueue()" style="padding: 12px 20px; border: 2px solid #e0e0e0; background: white; border-radius: 10px; font-weight: 600; cursor: pointer; color: #333; font-size: 14px; outline: none; transition: all 0.3s ease;">
                <option value="">All Locations</option>
            </select>
        </div>

        <div id="reservations-list"></div>
    </main>

    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditProfile()">&times;</span>
            <h2>Edit Profile</h2>
            <form id="profileForm">
                <div class="form-group"><label>Name</label><input type="text" id="editName" required></div>
                <div class="form-group"><label>Role</label><input type="text" id="editRole" required></div>
                <div class="form-group">
                    <label>Profile Photo</label>
                    <input type="file" id="editPhoto" accept="image/*">
                    <div style="margin-top: 10px;">
                        <img id="photoPreview" src="" alt="Preview" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: none; background: #667eea;">
                    </div>
                </div>
                <button type="submit" class="btn-primary">Save Profile</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/router.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/profile.js"></script>
    <script>
        let allReservations = [];
        let currentFilter = 'all';
        let locations = [];

        async function loadLocations() {
            try {
                const response = await fetch(`${API_BASE}/settings/locations`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                locations = await response.json();
                const select = document.getElementById('location-select');
                select.innerHTML = '<option value="">All Locations</option>' +
                    locations.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
            } catch (error) {
                console.error('Failed to load locations:', error);
            }
        }

        async function loadQueue() {
            const locationId = document.getElementById('location-select').value;
            try {
                const url = locationId
                    ? `${API_BASE}/reservations/?location_id=${locationId}`
                    : `${API_BASE}/reservations/`;
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                allReservations = await response.json();
                renderReservations();
            } catch (error) {
                console.error('Failed to load reservations:', error);
                showToast('Failed to load reservations', 'error');
            }
        }

        function filterReservations(status) {
            currentFilter = status;
            const sidebarColor = getComputedStyle(document.documentElement).getPropertyValue('--sidebar-color').trim() || '#667eea';
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.filter === status) {
                    btn.classList.add('active');
                    btn.style.background = sidebarColor;
                    btn.style.color = 'white';
                    btn.style.border = '2px solid ' + sidebarColor;
                    btn.style.boxShadow = '0 2px 8px rgba(102, 126, 234, 0.3)';
                } else {
                    btn.style.background = 'white';
                    btn.style.color = '#333';
                    btn.style.border = '2px solid #e0e0e0';
                    btn.style.boxShadow = 'none';
                }
            });
            renderReservations();
        }

        function renderReservations() {
            const container = document.getElementById('reservations-list');
            const filtered = currentFilter === 'all'
                ? allReservations
                : allReservations.filter(r => r.status === currentFilter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">&#128301; No reservations found</div>';
                return;
            }

            container.innerHTML = filtered.map((res, i) => `
                <div class="queue-card" style="animation-delay: ${i * 0.06}s">
                    <div class="card-header">
                        <div class="order-info">
                            <h3>&#128221; ${res.reservation_number}</h3>
                            <p class="order-date">&#128197; ${new Date(res.created_at).toLocaleString()}</p>
                            ${res.queue_position ? `<p style="color: white; margin: 5px 0 0 0; font-weight: bold;">Queue Position: #${res.queue_position}</p>` : ''}
                        </div>
                        <span class="status-badge status-${res.status}">${res.status.replace('_', ' ').toUpperCase()}</span>
                    </div>
                    <div class="card-body">
                        <div class="order-details">
                            <div class="detail-item">
                                <span class="detail-label">&#128295; Service:</span>
                                <span class="detail-value">${res.service.name}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">&#128205; Location:</span>
                                <span class="detail-value">${res.location.name}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">&#128663; Vehicle:</span>
                                <span class="detail-value">${res.vehicle_plate}</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-actions">
                        ${res.status === 'pending' ? `
                            <button onclick="updateStatus(${res.id}, 'accepted')" class="action-btn accept-btn">Accept</button>
                            <button onclick="updateStatus(${res.id}, 'cancelled')" class="action-btn reject-btn">Reject</button>
                        ` : ''}
                        ${res.status === 'accepted' ? `
                            <button onclick="updateStatus(${res.id}, 'in_progress')" class="action-btn process-btn">Start Service</button>
                            <button onclick="updateStatus(${res.id}, 'cancelled')" class="action-btn reject-btn">Cancel</button>
                        ` : ''}
                        ${res.status === 'in_progress' ? `
                            <button onclick="updateStatus(${res.id}, 'completed')" class="action-btn complete-btn">Mark Complete</button>
                            <button onclick="updateStatus(${res.id}, 'delayed')" class="action-btn" style="background: linear-gradient(135deg, #f0932b 0%, #e67e22 100%);">Delay</button>
                        ` : ''}
                        ${res.status === 'delayed' ? `
                            <button onclick="updateStatus(${res.id}, 'in_progress')" class="action-btn process-btn">Resume</button>
                            <button onclick="updateStatus(${res.id}, 'cancelled')" class="action-btn reject-btn">Cancel</button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(reservationId, status) {
            try {
                const response = await fetch(`${API_BASE}/reservations/${reservationId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                    body: JSON.stringify({ status })
                });
                if (!response.ok) throw new Error('Failed to update');
                showToast('Reservation status updated', 'success');
                loadQueue();
            } catch (error) {
                showToast('Failed to update status', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        loadLocations().then(() => loadQueue());
        setInterval(loadQueue, 30000);
    </script>

    <style>
        .queue-card { background: white; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); overflow: hidden; transition: transform 0.3s ease, box-shadow 0.3s ease; animation: fadeSlideIn 0.45s ease both; }
        .queue-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
        .card-header { background: var(--sidebar-color, #667eea); padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .order-info h3 { color: white; margin: 0 0 8px 0; font-size: 1.3rem; }
        .order-date { color: rgba(255,255,255,0.9); margin: 0; font-size: 0.9rem; }
        .status-badge { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-accepted { background: #d1ecf1; color: #0c5460; }
        .status-in_progress { background: #cce5ff; color: #004085; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .status-delayed { background: #fff8e1; color: #f57c00; }
        .card-body { padding: 25px; }
        .order-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .detail-item { display: flex; justify-content: space-between; padding: 12px; background: #f8f9fa; border-radius: 10px; }
        .detail-label { font-weight: 600; color: #495057; }
        .detail-value { font-weight: bold; color: var(--sidebar-color, #667eea); }
        .card-actions { padding: 20px; background: #f8f9fa; display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s ease; color: white; }
        .action-btn:hover { transform: scale(1.05); }
        .accept-btn { background: var(--sidebar-color, #28a745); }
        .reject-btn { background: #dc3545; }
        .process-btn { background: var(--primary-color, #007bff); }
        .complete-btn { background: #28a745; }
        .empty-state { text-align: center; color: #666; font-size: 1.5rem; padding: 60px 20px; display: flex; justify-content: center; align-items: center; }
        #location-select:hover, #location-select:focus { border-color: var(--sidebar-color, #667eea); box-shadow: 0 2px 8px rgba(102,126,234,0.3); }
    </style>
</body>
</html>
