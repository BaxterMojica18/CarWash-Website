# render.yaml — Infrastructure as Code for Render deployment
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: carwash-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carwash-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: PYTHONPATH
        value: /app
    healthCheckPath: /api/health

databases:
  - name: carwash-db
    plan: free
    databaseName: carwash_db
    user: carwash_user
