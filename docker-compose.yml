services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: NewSecurePass2025!
      POSTGRES_DB: carwash_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:NewSecurePass2025!@db:5432/carwash_db
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FROM_EMAIL: ${FROM_EMAIL}
      PYTHONPATH: /app
    depends_on:
      - db
    volumes:
      - ./frontend:/app/frontend
      - ./app:/app/app
      - ./commands:/app/commands
    command: >
      sh -c "sleep 10 && 
             python commands/database/migrate_db.py && 
             python commands/database/add_signup_columns.py && 
             python -c \"from sqlalchemy import text; from app.database import engine; c=engine.connect(); c.execute(text('ALTER TABLE settings_theme_selection ADD COLUMN IF NOT EXISTS for_client BOOLEAN DEFAULT FALSE')); c.commit(); c.close(); print('Migration: for_client column OK')\" && 
             python commands/users/setup_demo_accounts.py && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
