services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: NewSecurePass2025!
      POSTGRES_DB: carwash_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:NewSecurePass2025!@db:5432/carwash_db
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      PYTHONPATH: /app
    depends_on:
      - db
    volumes:
      - ./frontend:/app/frontend
      - ./app:/app/app
    command: >
      sh -c "sleep 10 && 
             python commands/database/migrate_db.py && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
